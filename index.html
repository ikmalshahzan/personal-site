<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ikmal Shahzan — Personal Portfolio</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --green: #39d353;
      --green-dim: #196127;
      --blue: #58a6ff;
      --orange: #f78166;
      --purple: #bc8cff;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --text-dim: #484f58;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      width: 12px; height: 12px;
      background: var(--green);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid rgba(57,211,83,0.4);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease-out, top 0.12s ease-out, width 0.2s, height 0.2s;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

    /* Grid noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper { position: relative; z-index: 1; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--green); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 56px 2rem 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    .hero-inner { width: 100%; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(57,211,83,0.08);
      border: 1px solid rgba(57,211,83,0.2);
      color: var(--green);
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
    }
    .hero-name .line2 { color: var(--text-muted); }
    .hero-name .accent { color: var(--green); }

    .hero-desc {
      max-width: 560px;
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .hero-desc strong { color: var(--text); font-weight: 500; }

    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: none;
    }
    .btn-primary {
      background: var(--green);
      color: #0d1117;
      font-weight: 700;
      border: 1px solid var(--green);
    }
    .btn-primary:hover { background: transparent; color: var(--green); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    .hero-stats {
      display: flex; gap: 2.5rem;
      margin-top: 4rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .stat-num span { color: var(--green); }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* SECTIONS */
    section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6rem 2rem;
    }
    .section-label {
      font-size: 0.7rem;
      color: var(--green);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 3rem;
      line-height: 1.1;
    }

    /* EXPERTISE */
    .expertise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .expertise-card {
      background: var(--bg);
      padding: 2rem;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .expertise-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--green);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .expertise-card:hover { background: var(--bg2); }
    .expertise-card:hover::before { transform: scaleX(1); }
    .card-icon {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
    }
    .card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* SKILLS */
    .skills-container { display: flex; flex-direction: column; gap: 1.5rem; }
    .skill-row {
      display: flex; align-items: center; gap: 1.5rem;
    }
    .skill-name {
      width: 180px;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .skill-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 1px;
      overflow: hidden;
    }
    .skill-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 1px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .skill-pct {
      font-size: 0.72rem;
      color: var(--text-dim);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* CONTRIBUTION GRAPH */
    .contrib-section { }
    .contrib-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 1.5rem;
      flex-wrap: wrap; gap: 1rem;
    }
    .contrib-graph {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      overflow-x: auto;
    }
    .contrib-grid {
      display: flex; gap: 3px;
    }
    .contrib-col { display: flex; flex-direction: column; gap: 3px; }
    .contrib-cell {
      width: 12px; height: 12px;
      border-radius: 2px;
      background: var(--bg3);
    }
    .contrib-cell.l1 { background: #0e4429; }
    .contrib-cell.l2 { background: #006d32; }
    .contrib-cell.l3 { background: #26a641; }
    .contrib-cell.l4 { background: #39d353; }

    /* EXPERIENCE */
    .timeline { position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 0; top: 8px; bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .timeline-item {
      padding-left: 2rem;
      position: relative;
      margin-bottom: 3rem;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -4px; top: 8px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--green);
    }
    .timeline-year {
      font-size: 0.7rem;
      color: var(--green);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .timeline-role {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .timeline-company {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }
    .timeline-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .timeline-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
    .tag {
      font-size: 0.68rem;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      background: var(--bg3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* CONTACT */
    .contact-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }
    @media (max-width: 640px) {
      .contact-box { grid-template-columns: 1fr; padding: 2rem; }
    }
    .contact-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .contact-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .contact-links { display: flex; flex-direction: column; gap: 1rem; }
    .contact-link {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      background: var(--bg);
    }
    .contact-link:hover {
      border-color: var(--green);
      background: rgba(57,211,83,0.05);
    }
    .contact-link-icon { font-size: 1.1rem; }
    .contact-link-text { font-size: 0.78rem; }
    .contact-link-label { font-size: 0.65rem; color: var(--text-muted); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    footer span { color: var(--green); }

    /* ANIMATIONS */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      nav { padding: 0 1rem; }
      .hero { padding: 72px 1rem 0; }
      section { padding: 4rem 1rem; }
      .hero-stats { gap: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    // Custom cursor
    function useCursor() {
      useEffect(() => {
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        let mx = 0, my = 0;
        const move = (e) => {
          mx = e.clientX; my = e.clientY;
          cursor.style.left = mx + 'px';
          cursor.style.top = my + 'px';
          ring.style.left = mx + 'px';
          ring.style.top = my + 'px';
        };
        window.addEventListener('mousemove', move);
        return () => window.removeEventListener('mousemove', move);
      }, []);
    }

    // Intersection observer for fade-up
    function useFadeUp() {
      useEffect(() => {
        const els = document.querySelectorAll('.fade-up');
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.12 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    // Skill bars animation
    function useSkillBars() {
      useEffect(() => {
        const bars = document.querySelectorAll('.skill-bar-fill');
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              const pct = e.target.dataset.pct;
              e.target.style.width = pct + '%';
            }
          });
        }, { threshold: 0.3 });
        bars.forEach(b => obs.observe(b));
        return () => obs.disconnect();
      }, []);
    }

    // Generate contribution graph
    function ContribGraph() {
      const weeks = 52;
      const levels = [0,0,0,1,1,2,2,3,4];
      const cols = [];
      for (let w = 0; w < weeks; w++) {
        const cells = [];
        for (let d = 0; d < 7; d++) {
          const lvl = levels[Math.floor(Math.random() * levels.length)];
          cells.push(<div key={d} className={`contrib-cell${lvl > 0 ? ' l'+lvl : ''}`} />);
        }
        cols.push(<div key={w} className="contrib-col">{cells}</div>);
      }
      return <div className="contrib-grid">{cols}</div>;
    }

    // Typewriter effect
    function Typewriter({ strings }) {
      const [text, setText] = useState('');
      const [si, setSi] = useState(0);
      const [ci, setCi] = useState(0);
      const [deleting, setDeleting] = useState(false);
      useEffect(() => {
        const current = strings[si];
        const speed = deleting ? 40 : 80;
        const timer = setTimeout(() => {
          if (!deleting) {
            setText(current.slice(0, ci + 1));
            if (ci + 1 === current.length) {
              setTimeout(() => setDeleting(true), 1800);
            } else setCi(c => c + 1);
          } else {
            setText(current.slice(0, ci - 1));
            if (ci - 1 === 0) {
              setDeleting(false);
              setSi(s => (s + 1) % strings.length);
              setCi(0);
            } else setCi(c => c - 1);
          }
        }, speed);
        return () => clearTimeout(timer);
      }, [ci, deleting, si]);
      return <span>{text}<span style={{color:'var(--green)',animation:'blink 1s infinite'}}>|</span></span>;
    }

    const skills = [
      { name: 'WordPress / CMS', pct: 95 },
      { name: 'HTML / CSS', pct: 92 },
      { name: 'JavaScript / React', pct: 82 },
      { name: 'CRM Integration', pct: 90 },
      { name: 'Lead Automation', pct: 88 },
      { name: 'Website Performance', pct: 85 },
      { name: 'Plugin Development', pct: 80 },
      { name: 'SEO / Analytics', pct: 78 },
    ];

    const expertise = [
      { icon: '⚡', title: 'Lead Generation Systems', desc: 'Architecting websites engineered to convert visitors into qualified leads through strategic UX, CTA placement, and funnel optimization.' },
      { icon: '🔗', title: 'CRM & Plugin Integration', desc: 'Seamlessly connecting CMS platforms with CRMs, automating campaign lead management and keeping plugin ecosystems healthy and up-to-date.' },
      { icon: '🏗️', title: 'CMS Architecture', desc: 'Enhancing CMS structure for maintainability, scalability, and editorial efficiency — clean taxonomy, custom fields, and headless-ready setups.' },
      { icon: '🚀', title: 'Performance Optimization', desc: 'Diagnosing and resolving Core Web Vitals issues. Delivering sub-2s load times through caching, asset optimization, and server tuning.' },
      { icon: '🤖', title: 'Workflow Automation', desc: 'Building automated pipelines that handle lead capture, notification routing, and data sync — reducing manual work and human error.' },
      { icon: '🛡️', title: 'Maintenance & Security', desc: 'Proactive plugin updates, security hardening, uptime monitoring, and backup strategies to keep client sites reliable 24/7.' },
    ];

    function App() {
      useCursor();
      useFadeUp();
      useSkillBars();

      return (
        <div className="page-wrapper">
          {/* NAV */}
          <nav>
            <div className="nav-logo">ikmal<span>.</span>dev</div>
            <div className="nav-links">
              <a href="#expertise">Expertise</a>
              <a href="#skills">Skills</a>
              <a href="#experience">Experience</a>
              <a href="#contact">Contact</a>
            </div>
          </nav>

          {/* HERO */}
          <div className="hero">
            <div className="hero-inner">
              <div className="hero-tag fade-up">Available for new projects</div>
              <h1 className="hero-name fade-up" style={{transitionDelay:'0.1s'}}>
                <div>IKMAL</div>
                <div className="line2">SHAHZAN<span className="accent">.</span></div>
              </h1>
              <p className="hero-desc fade-up" style={{transitionDelay:'0.2s'}}>
                <strong>Web Solutions Developer</strong> with 5+ years turning digital visitors into business leads.
                I build and maintain systems that <strong>integrate CRMs</strong>, automate campaign workflows,
                and deliver <strong>high-performance websites</strong> that work as hard as you do.
              </p>
              <div className="hero-cta fade-up" style={{transitionDelay:'0.3s'}}>
                <a href="#contact" className="btn btn-primary">→ Get in touch</a>
                <a href="#expertise" className="btn btn-ghost">View my work</a>
              </div>
              <div className="hero-stats fade-up" style={{transitionDelay:'0.4s'}}>
                <div>
                  <div className="stat-num">5<span>+</span></div>
                  <div className="stat-label">Years experience</div>
                </div>
                <div>
                  <div className="stat-num"><Typewriter strings={['Leads','Growth','Results']} /></div>
                  <div className="stat-label">What I deliver</div>
                </div>
                <div>
                  <div className="stat-num">∞</div>
                  <div className="stat-label">Integrations built</div>
                </div>
              </div>
            </div>
          </div>

          {/* EXPERTISE */}
          <section id="expertise">
            <div className="section-label fade-up">// what I do</div>
            <h2 className="section-title fade-up">Core Expertise</h2>
            <div className="expertise-grid fade-up">
              {expertise.map((e, i) => (
                <div key={i} className="expertise-card">
                  <div className="card-icon">{e.icon}</div>
                  <div className="card-title">{e.title}</div>
                  <div className="card-desc">{e.desc}</div>
                </div>
              ))}
            </div>
          </section>

          {/* SKILLS */}
          <section id="skills">
            <div className="section-label fade-up">// stack & proficiency</div>
            <h2 className="section-title fade-up">Skills</h2>
            <div className="skills-container fade-up">
              {skills.map((s, i) => (
                <div key={i} className="skill-row">
                  <div className="skill-name">{s.name}</div>
                  <div className="skill-bar-bg">
                    <div className="skill-bar-fill" data-pct={s.pct} />
                  </div>
                  <div className="skill-pct">{s.pct}%</div>
                </div>
              ))}
            </div>
          </section>

          {/* CONTRIBUTION */}
          <section className="contrib-section">
            <div className="section-label fade-up">// activity</div>
            <h2 className="section-title fade-up">Contribution Activity</h2>
            <div className="contrib-graph fade-up">
              <ContribGraph />
              <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginTop:'1rem',justifyContent:'flex-end'}}>
                <span style={{fontSize:'0.68rem',color:'var(--text-dim)'}}>Less</span>
                {['var(--bg3)','#0e4429','#006d32','#26a641','#39d353'].map((c,i)=>(
                  <div key={i} style={{width:12,height:12,borderRadius:2,background:c}} />
                ))}
                <span style={{fontSize:'0.68rem',color:'var(--text-dim)'}}>More</span>
              </div>
            </div>
          </section>

          {/* EXPERIENCE */}
          <section id="experience">
            <div className="section-label fade-up">// career</div>
            <h2 className="section-title fade-up">Experience</h2>
            <div className="timeline fade-up">
              <div className="timeline-item">
                <div className="timeline-year">2025 — Present</div>
                <div className="timeline-role">Solutions Developer</div>
                <div className="timeline-company">2x Marketing</div>
                <div className="timeline-desc">
                  Leading end-to-end web solution development — from architecting CMS structures to integrating CRM platforms and automating lead management pipelines. Responsible for plugin maintenance, performance audits, and ensuring all client websites maintain peak uptime and speed scores.
                </div>
                <div className="timeline-tags">
                  <span className="tag">WordPress</span>
                  <span className="tag">CRM Integration</span>
